[project]
name = "tensorbench"
version = "0.1.0"
description = "Benchmark your AI hardware. Real metrics & upgrade advice."
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "TensorBench Contributors"}]

dependencies = [
    "psutil>=5.9.0",
    "rich>=13.0.0",
    "click>=8.1.0"
]

[project.scripts]
tensorbench = "main:cli"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"
